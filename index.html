<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Pembelajaran PKL</title><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}

body{
min-height:100vh;
display:flex;
background:linear-gradient(135deg,#ff6a00,#ee0979,#4facfe,#7f7fd5);
background-size:300% 300%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */
.sidebar{
width:240px;
background:rgba(0,0,0,0.75);
color:white;
padding:15px;
backdrop-filter:blur(10px);
display:flex;
flex-direction:column;
}

.sidebar h2{
text-align:center;
margin-bottom:10px;
}

.sidebar button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
cursor:pointer;
background:white;
font-weight:bold;
transition:0.2s;
}

.sidebar button:hover{
background:#4facfe;
color:white;
}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

.header{
text-align:center;
color:white;
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.page{display:none}
.active{display:block}

.card{
background:rgba(255,255,255,0.92);
padding:15px;
border-radius:16px;
margin-top:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
outline:none;
}

button.action{
background:#4facfe;
color:white;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-weight:bold;
}

ul{list-style:none;padding:0}

li{
background:white;
padding:10px;
margin:6px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.delete{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{
width:100%;
flex-direction:row;
overflow-x:auto;
}
.sidebar button{
flex:1;
font-size:12px;
}
.sidebar h2{display:none}
}

</style></head><body><!-- SIDEBAR --><div class="sidebar">
<h2>MENU</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('profil')">Profil</button>
<button onclick="show('kegiatan')">Kegiatan</button>
<button onclick="show('kesimpulan')">Kesimpulan</button>
</div><!-- MAIN --><div class="main"><div class="header">Website Pembelajaran PKL</div><!-- DASHBOARD --><div id="dashboard" class="page active">
<h2>Dashboard</h2><div class="card">
<p id="tanggalText"></p>
<input type="date" id="tanggalInput">
<button class="action" onclick="setTanggal()">Simpan Tanggal</button>
</div><div class="card">
Total Kegiatan: <b id="total">0</b>
</div>
</div><!-- PROFIL --><div id="profil" class="page">
<h2>Profil</h2>
<input id="nama" placeholder="Nama">
<input id="sekolah" placeholder="Sekolah">
<input id="tempat" placeholder="Tempat PKL">
<button class="action" onclick="saveProfil()">Simpan Profil</button>
<div class="card" id="profilResult"></div>
</div><!-- KEGIATAN --><div id="kegiatan" class="page">
<h2>Kegiatan</h2>
<input type="date" id="tgl">
<input id="keg" placeholder="Kegiatan">
<button class="action" onclick="addKegiatan()">Tambah</button>
<ul id="list"></ul>
</div><!-- KESIMPULAN --><div id="kesimpulan" class="page">
<h2>Kesimpulan</h2>
<textarea id="kesimpulanText" placeholder="Tulis kesimpulan..."></textarea>
<button class="action" onclick="saveKesimpulan()">Simpan</button>
<div class="card" id="kesimpulanResult"></div>
</div></div><script>
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// TANGGAL
function setTanggal(){
const v=document.getElementById('tanggalInput').value;
if(!v)return alert('Pilih tanggal');
localStorage.setItem('tanggal',v);
renderTanggal();
}

function renderTanggal(){
const t=localStorage.getItem('tanggal')||new Date().toISOString().split('T')[0];
document.getElementById('tanggalText').innerText=
new Date(t).toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('tanggalInput').value=t;
}

// PROFIL
function saveProfil(){
const data={
nama:document.getElementById('nama').value,
sekolah:document.getElementById('sekolah').value,
tempat:document.getElementById('tempat').value
};
localStorage.setItem('profil',JSON.stringify(data));
renderProfil();
}

function renderProfil(){
const p=JSON.parse(localStorage.getItem('profil'));
if(p){
document.getElementById('profilResult').innerHTML=
`Nama: ${p.nama}<br>Sekolah: ${p.sekolah}<br>Tempat PKL: ${p.tempat}`;
}
}

// KEGIATAN
function addKegiatan(){
const t=document.getElementById('tgl').value;
const k=document.getElementById('keg').value;
if(!t||!k)return alert('Isi semua data');

let data=JSON.parse(localStorage.getItem('kegiatan'))||[];
data.push({t,k});
localStorage.setItem('kegiatan',JSON.stringify(data));
renderKegiatan();
}

function deleteKegiatan(i){
if(!confirm('Hapus kegiatan?'))return;
let data=JSON.parse(localStorage.getItem('kegiatan'))||[];
data.splice(i,1);
localStorage.setItem('kegiatan',JSON.stringify(data));
renderKegiatan();
}

function renderKegiatan(){
let data=JSON.parse(localStorage.getItem('kegiatan'))||[];
document.getElementById('list').innerHTML=
data.map((d,i)=>`
<li>
<span>${new Date(d.t).toLocaleDateString('id-ID')} - ${d.k}</span>
<button class='delete' onclick='deleteKegiatan(${i})'>Hapus</button>
</li>`).join('');

document.getElementById('total').innerText=data.length;
}

// KESIMPULAN
function saveKesimpulan(){
const v=document.getElementById('kesimpulanText').value;
localStorage.setItem('kesimpulan',v);
renderKesimpulan();
}

function renderKesimpulan(){
const v=localStorage.getItem('kesimpulan');
if(v)document.getElementById('kesimpulanResult').innerText=v;
}

// INIT
renderTanggal();
renderProfil();
renderKegiatan();
renderKesimpulan();
</script></body>
</html>
