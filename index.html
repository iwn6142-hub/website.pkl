<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Pembelajaran PKL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
display:flex;
min-height:100vh;
background:linear-gradient(135deg,#ff4e50,#f9d423,#24c6dc,#5433ff);
background-size:400% 400%;
animation:bg 10s infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */
.sidebar{
width:250px;
background:rgba(0,0,0,0.75);
color:white;
padding:15px;
}

.sidebar h2{text-align:center;margin-bottom:10px}

.sidebar button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.sidebar button:hover{
background:#24c6dc;
color:white;
}

/* CONTENT */
.main{flex:1;padding:20px}

.header{
text-align:center;
color:white;
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

button.action{
width:100%;
padding:10px;
margin-top:10px;
background:#24c6dc;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* LIST */
li{
background:white;
margin:8px 0;
padding:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

/* HP */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{width:100%;display:flex;flex-wrap:wrap}
.sidebar button{width:48%}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>MENU PKL</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('profil')">Profil</button>
<button onclick="show('kegiatan')">Kegiatan</button>
<button onclick="show('kesimpulan')">Kesimpulan</button>
</div>

<div class="main">
<div class="header">Website Pembelajaran PKL</div>

<!-- DASHBOARD -->
<div id="dashboard">
<div class="card">
<h3>Pilih Tanggal</h3>
<input type="date" id="tgl">
<button class="action" onclick="saveDate()">Simpan</button>
<p id="showDate"></p>
</div>

<div class="card">
<h3>Total Catatan</h3>
<p id="total">0</p>
</div>
</div>

<!-- PROFIL -->
<div id="profil" style="display:none">
<div class="card">
<h3>Profil Siswa</h3>
<p>Nama: Irwan Heryanto</p>
<p>Sekolah: SMK Yadika 9 Bintara</p>
<p>Kelas: XI TJKT 1</p>
<p>Tempat PKL: PT. Fortunet Solusi Indonesia</p>
</div>
</div>

<!-- KEGIATAN -->
<div id="kegiatan" style="display:none">
<div class="card">
<h3>Tambah Kegiatan</h3>
<input type="date" id="tglK">
<input type="text" id="isiK" placeholder="Isi kegiatan">
<button class="action" onclick="add()">Tambah</button>
</div>

<ul id="list"></ul>
</div>

<!-- KESIMPULAN -->
<div id="kesimpulan" style="display:none">
<div class="card">
<h3>Kesimpulan</h3>
<textarea id="kes"></textarea>
<button class="action" onclick="saveKes()">Simpan</button>
<p id="hasilKes"></p>
</div>
</div>

</div>

<script>

function show(id){
document.querySelectorAll("div[id]").forEach(e=>e.style.display="none");
document.getElementById(id).style.display="block";
}

// tanggal
function saveDate(){
let t=document.getElementById("tgl").value;
localStorage.setItem("tgl",t);
document.getElementById("showDate").innerText=t;
}

// kegiatan
function add(){
let t=document.getElementById("tglK").value;
let isi=document.getElementById("isiK").value;

if(!t||!isi)return alert("Isi lengkap!");

let data=JSON.parse(localStorage.getItem("data"))||[];
data.push({t,isi});
localStorage.setItem("data",JSON.stringify(data));

render();
}

function render(){
let data=JSON.parse(localStorage.getItem("data"))||[];
document.getElementById("total").innerText=data.length;

document.getElementById("list").innerHTML=data.map((d,i)=>`
<li>
${d.t} - ${d.isi}
<button onclick="hapus(${i})">Hapus</button>
</li>
`).join("");
}

function hapus(i){
let data=JSON.parse(localStorage.getItem("data"))||[];
data.splice(i,1);
localStorage.setItem("data",JSON.stringify(data));
render();
}

// kesimpulan
function saveKes(){
let k=document.getElementById("kes").value;
localStorage.setItem("kes",k);
document.getElementById("hasilKes").innerText=k;
}

render();

</script>

</body>
</html>
